name: ML Pipeline CI/CD

on:
  push:
    branches: [ main ]

jobs:
  train-and-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # อัปเดตแก้ Node.js Warning

      - name: Set up Python
        uses: actions/setup-python@v5 # เพิ่มขั้นตอน Setup Python
        with:
          python-version: '3.10'
          cache: 'pip' # ช่วยให้รันครั้งต่อไปเร็วขึ้น

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # หากยังไม่ได้ใส่ evidently ใน requirements.txt ให้ใส่บรรทัดล่างนี้กันเหนียว
          pip install evidently 

      - name: Run ML Pipeline
        run: |
          # สร้างไฟล์ข้อมูลจำลองเพื่อให้ Monitoring Stage ไม่พัง
          mkdir -p data
          touch data/new_production_data.csv 
          python main.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_S3_ENDPOINT_URL: ${{ secrets.MLFLOW_S3_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          MLFLOW_S3_IGNORE_TLS: "true"

  deploy-to-k8s:
    needs: train-and-eval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # ขั้นตอนนี้ต้องมีการ Setup kubectl และ Kubeconfig ก่อนถึงจะรันได้
      - name: Update KServe InferenceService
        run: |
          # kubectl apply -f kserve-deploy.yaml 
          echo "Deploying to KServe..."