  mlflow:
    build: ./mlflow
    container_name: mlflow_mlops
    ports:
      - ${MLFLOW_HOST_PORT}:${MLFLOW_CONT_PORT}
    volumes:
      - ${MLFLOW_HOST_CONFIG_PATH}:${MLFLOW_CONT_CONFIG_PATH}
      - ./mlflow/data:/mlflow/db_data
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_S3_ENDPOINT_URL=http://10.1.0.250:9000
      - MLFLOW_S3_IGNORE_TLS=true
      #- MLFLOW_HTTP_CORS_ALLOW_ORIGIN=http://10.1.0.150:5000,http://localhost:5000
      #- MLFLOW_HTTP_CORS_ALLOW_METHODS=GET,POST,OPTIONS,PUT
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/db_data/mlflow.db
      --default-artifact-root s3://mlflow/
      --serve-artifacts

    networks:
      - mlops-net
    restart: unless-stopped

  fraud-api:
    build: ./app
    container_name: fraud_api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_S3_ENDPOINT_URL=http://10.1.0.250:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_S3_IGNORE_TLS=true
    networks:
      - mlops-net
    restart: unless-stopped

networks:
  mlops-net:
    driver: bridge
